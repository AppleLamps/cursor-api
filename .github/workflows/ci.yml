name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  smoke:
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare vendor database
        run: npm run vendor:prepare

      - name: Build
        run: npm run build

      # GitHub forbids `secrets.*` in step `if:` — check inside the script instead.
      - name: Full stack smoke (Electron)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          API_FOR_CURSOR_HOME: ${{ runner.temp }}\api-for-cursor-smoke
          SMOKE_HEALTH_TIMEOUT_MS: "120000"
          SMOKE_HTTP_TIMEOUT_MS: "120000"
          SMOKE_DEADLINE_MS: "300000"
        shell: pwsh
        run: |
          if (-not $env:CURSOR_API_KEY) {
            Write-Host "::notice::Full-stack smoke skipped. Add repository secret CURSOR_API_KEY."
            Write-Host "See docs/ci-smoke.md"
            exit 0
          }
          npm run smoke
